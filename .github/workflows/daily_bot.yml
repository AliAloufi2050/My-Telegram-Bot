name: TechGear AI Automation

on:
  schedule:
    # 9 صباحاً بتوقيت السعودية (06:00 UTC)
    - cron: '0 6 * * *'
    # 2 ظهراً بتوقيت السعودية (11:00 UTC)
    - cron: '0 11 * * *'
    # 8 مساءً بتوقيت السعودية (17:00 UTC)
    - cron: '0 17 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          pip install requests google-generativeai

      - name: Run Bot
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHANNEL_ID: ${{ secrets.CHANNEL_ID }}
        run: |
          python bot.py
